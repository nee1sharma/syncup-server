name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version-file: syncup-server-go/go.mod
          cache-dependency-path: syncup-server-go/go.sum

      - name: Build release jar
        run: ./gradlew clean test bootJar

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          app_version="$(./gradlew -q printVersion)"

          if [[ -z "${app_version}" ]]; then
            echo "Could not read project version from build.gradle" >&2
            exit 1
          fi

          if [[ "${version}" != "${app_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match application version ${app_version}" >&2
            exit 1
          fi

          jar_file=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)
          if [[ -z "${jar_file}" ]]; then
            echo "Boot jar not found under build/libs" >&2
            exit 1
          fi

          mkdir -p release-assets
          cp "${jar_file}" "release-assets/syncup-server-${version}.jar"
          cp docs/user-guide.md "release-assets/syncup-user-guide-${version}.md"
          (cd syncup-server-go && go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "../release-assets/syncup-server-go-${version}" ./cmd/syncup-server)

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "SyncUp Server ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
